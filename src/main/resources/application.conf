# Billing Service — сервис биллинга и оплаты
# Порт: 8099

server {
  host = "0.0.0.0"
  port = 8099
}

postgres {
  host = "localhost"
  host = ${?POSTGRES_HOST}
  port = 5432
  port = ${?POSTGRES_PORT}
  database = "billing"
  database = ${?POSTGRES_DB}
  user = "wayrecall"
  user = ${?POSTGRES_USER}
  password = "wayrecall"
  password = ${?POSTGRES_PASSWORD}
  max-pool-size = 10
}

kafka {
  bootstrap-servers = "localhost:9092"
  bootstrap-servers = ${?KAFKA_BOOTSTRAP_SERVERS}
  consumer-group = "billing-service"
  topics {
    device-events = "device-events"
    billing-events = "billing-events"
    billing-commands = "billing-commands"
  }
}

# Настройки планировщика ежедневных списаний
fee-processor {
  # Час запуска ежедневного списания (UTC)
  daily-run-hour = 3
  # Retry при ошибке списания
  max-retries = 3
  retry-delay-seconds = 60
}

# Платёжные шлюзы (провайдер-агностичная архитектура)
payment-gateways {
  # По умолчанию используется mock для разработки
  default-provider = "mock"
  default-provider = ${?PAYMENT_DEFAULT_PROVIDER}

  # Тинькофф Эквайринг
  tinkoff {
    enabled = false
    enabled = ${?TINKOFF_ENABLED}
    terminal-key = ""
    terminal-key = ${?TINKOFF_TERMINAL_KEY}
    secret-key = ""
    secret-key = ${?TINKOFF_SECRET_KEY}
    api-url = "https://securepay.tinkoff.ru/v2"
  }

  # Сбербанк Эквайринг
  sber {
    enabled = false
    enabled = ${?SBER_ENABLED}
    merchant-login = ""
    merchant-login = ${?SBER_MERCHANT_LOGIN}
    merchant-password = ""
    merchant-password = ${?SBER_MERCHANT_PASSWORD}
    api-url = "https://securepayments.sberbank.ru/payment/rest"
  }

  # ЮKassa (ex-Яндекс.Касса)
  yookassa {
    enabled = false
    enabled = ${?YOOKASSA_ENABLED}
    shop-id = ""
    shop-id = ${?YOOKASSA_SHOP_ID}
    secret-key = ""
    secret-key = ${?YOOKASSA_SECRET_KEY}
    api-url = "https://api.yookassa.ru/v3"
  }
}
